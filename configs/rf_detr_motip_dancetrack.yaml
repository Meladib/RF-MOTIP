SUPER_CONFIG_PATH: ./configs/r50_deformable_detr_motip_dancetrack.yaml

CKPT_PATH: rfdetr_dancetrack_motip/checkpoint_best_total.pth
DETR_FRAMEWORK: rf_detr

# DETR_PRETRAIN is intentionally null for rf_detr.
# The fine-tuned weights are loaded from CKPT_PATH inside
# models/motip/__init__.py build().  train.py guards the
# load_detr_pretrain call so it is skipped for this framework.
DETR_PRETRAIN: null

# Must be 1 (person) to match the fine-tuned RF-DETR checkpoint.
# RF-DETR internally adds 1 (args.num_classes + 1), so class_embed
# has shape [2, D].  Setting NUM_CLASSES > 1 here would trigger a
# class_embed shape mismatch in load_detr_pretrain.
NUM_CLASSES: 1

# Training Strategies:
EPOCHS: 8
LR: 1.0e-4
LR_WARMUP_EPOCHS: 0
